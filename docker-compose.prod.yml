#version: '3.9'

services:
  web:
    build: .
    command: gunicorn GGI.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ./static:/app/static
      - ./staticfiles:/app/static_files
      - media_volume:/app/media
    env_file:
      - .env
    depends_on:
      - db
      - redis
    environment:
      RUN_MIGRATIONS: "true"
      WAIT_FOR_REDIS: "true"
      RUN_COLLECT_STATIC: "true"
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    restart: unless-stopped
    user: "1000:1000"  # Replace with your app user UID:GID

  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: unless-stopped

  redis:
    image: redis:7
    restart: unless-stopped

  celery:
    build: .
    command: celery -A GGI worker -Q celery,email --loglevel=info
    volumes:
      - ./static:/app/static
      - ./staticfiles:/app/static_files
      - media_volume:/app/media
    env_file:
      - .env
    restart: unless-stopped
    user: "1000:1000"  # Replace with your app user UID:GID

  nginx:
    image: nginx:1.25
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./staticfiles:/app/static_files:ro
      - ./media:/app/media:ro
    depends_on:
      - web


volumes:
  postgres_data:
  media_volume:
