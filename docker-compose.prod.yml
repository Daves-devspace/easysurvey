

services:
  web:
    image: davedevspace/ggi:latest  # Use your pushed image
    entrypoint: ["/app/entrypoint.sh"]
    command: gunicorn GGI.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ./static:/app/static
      - ./staticfiles:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env.prod
    depends_on:
      - db
      - redis
    environment:
      RUN_MIGRATIONS: "true"
      WAIT_FOR_REDIS: "true"
      RUN_COLLECT_STATIC: "true"
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    restart: always

  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: always

  redis:
    image: redis:7
    restart: always

  celery-worker:
    image: davedevspace/ggi:latest # Use the same image as web
    command: celery -A GGI worker --loglevel=info
    env_file:
      - .env.prod
    depends_on:
      - db
      - redis
    restart: always

volumes:
  postgres_data:
  media_volume:
