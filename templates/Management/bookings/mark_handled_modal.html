<form method="POST"
      action="{% url 'mark-booking-handled' booking.id %}">
    {% csrf_token %}
    <div class="modal-content">
        <div class="modal-header">
            <h5 class="modal-title"
                id="markHandledLabel">Mark
                Booking as Handled</h5>
            <button type="button"
                    class="btn-close"
                    data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
            <p>Select final surveyors who
                handled this booking:</p>
            {% for surveyor in surveyors %}
                <div class="form-check">
                    <input class="form-check-input"
                           type="checkbox"
                           name="surveyors"
                           value="{{ surveyor.id }}"
                           id="handle-s{{ surveyor.id }}"
                           {% if surveyor.id in assigned_ids %}checked{% endif %}>
                    <label class="form-check-label"
                           for="handle-s{{ surveyor.id }}">{{ surveyor.get_full_name|default:surveyor.username|default:"User" }}</label>
                </div>
            {% endfor %}
        </div>
        <div class="modal-footer">
            <button type="submit"
                    class="btn btn-success">
                Mark as Handled
            </button>
        </div>
    </div>
</form>
