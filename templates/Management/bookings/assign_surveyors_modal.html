<form method="POST"
      action="{% url 'assign-surveyors' booking.id %}">
    {% csrf_token %}
    <div class="modal-content">
        <div class="modal-header">
            <h5 class="modal-title"
                id="assignSurveyorsLabel">
                Assign Surveyors</h5>
            <button type="button"
                    class="btn-close"
                    data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
            {% for surveyor in surveyors %}
                <div class="form-check">
                    <input class="form-check-input"
                           type="checkbox"
                           name="surveyors"
                           value="{{ surveyor.id }}"
                           id="assign-s{{ surveyor.id }}"
                           {% if surveyor.id in assigned_ids %}checked{% endif %}>
                    <label class="form-check-label"
                           for="assign-s{{ surveyor.id }}">{{ surveyor.get_full_name }}</label>
                </div>
            {% endfor %}
        </div>
        <div class="modal-footer">
            <button type="submit"
                    class="btn btn-primary">
                Assign
            </button>
        </div>
    </div>
</form>
