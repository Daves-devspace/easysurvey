<form method="post"
      hx-post="{% url 'unit_add' property.pk %}"
      hx-target="#units-table"
      hx-swap="afterbegin">
  {% csrf_token %}
  <div class="modal-header">
    <h5 class="modal-title">{% if form.instance.pk %}Edit Unit{% else %}New Unit{% endif %}</h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
  </div>
  <div class="modal-body">
    {{ form.non_field_errors }}
    <div class="mb-3">{{ form.unit_number.label_tag }}{{ form.unit_number }}</div>
    <div class="mb-3">{{ form.rent_amount.label_tag }}{{ form.rent_amount }}</div>
    <div class="mb-3">{{ form.meter_number.label_tag }}{{ form.meter_number }}</div>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
    <button type="submit" class="btn btn-primary">Save</button>
  </div>
</form>

<script>
  document.body.addEventListener('htmx:afterSwap', (e) => {
    // Check if the modal content was swapped
    if (e.detail.target.id === "unitModal") {
      const modal = new bootstrap.Modal(document.getElementById('unitModal'));
      modal.show();
    }
  });
</script>
