<form method="post" action="{% url 'unit_assign' unit.pk %}">
  {% csrf_token %}
  <div class="mb-3">
    {{ form.tenant.label_tag }}{{ form.tenant }}  
    {{ form.tenant.errors }}
  </div>
  <div class="mb-3">
    {{ form.start_date.label_tag }}{{ form.start_date }}  
    {{ form.start_date.errors }}
  </div>
  <div class="mb-3">
    {{ form.deposit_amount.label_tag }}{{ form.deposit_amount }}  
    {{ form.deposit_amount.errors }}
  </div>
  <button type="submit" class="btn btn-primary">Assign Tenant</button>
</form>
