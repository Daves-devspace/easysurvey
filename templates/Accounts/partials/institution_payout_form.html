{# Accounts/partials/institution_payout_form.html #}

<form id="legalPayoutForm"
      method="post"
      action="{% url 'record-institution-payout' %}"
      hx-post="{% url 'record-institution-payout' %}"
      hx-target="#payoutModalBody"
      hx-swap="innerHTML">

  {% csrf_token %}

  {# non-field errors (form.non_field_errors) #}
  {% if form.non_field_errors %}
    <div class="alert alert-danger">
      {% for err in form.non_field_errors %}
        <div>{{ err }}</div>
      {% endfor %}
    </div>
  {% endif %}

  {{ form.as_p }}

  <div class="d-flex justify-content-end">
    <button type="button" class="btn btn-secondary me-2" data-bs-dismiss="modal">Cancel</button>
    <button type="submit" class="btn btn-success">Create Payout</button>
  </div>
</form>
