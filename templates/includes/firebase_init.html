{% if firebase_config and firebase_config.apiKey %}
<!-- Firebase App (the core Firebase SDK) is always required and must be listed first -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-messaging-compat.js"></script>

<script>
  (function() {
    console.log("🔥 Firebase Init Script Loaded");

    // 1. Configuration injected from Django Context Processor
    const firebaseConfig = {
      apiKey: "{{ firebase_config.apiKey }}",
      authDomain: "{{ firebase_config.authDomain }}",
      projectId: "{{ firebase_config.projectId }}",
      storageBucket: "{{ firebase_config.storageBucket }}",
      messagingSenderId: "{{ firebase_config.messagingSenderId }}",
      appId: "{{ firebase_config.appId }}"
    };
    const vapidKey = "{{ firebase_config.vapidKey }}";

    // 2. Initialize Firebase
    if (!firebase.apps.length) {
        try {
            firebase.initializeApp(firebaseConfig);
        } catch (e) {
            console.error("Firebase init error:", e);
        }
    }
    const messaging = firebase.messaging();

    // 3. Register Service Worker with Scope Fix
    if ('serviceWorker' in navigator) {
      const swUrl = "{% url 'firebase_sw' %}";
      
      // We register immediately. The 'Service-Worker-Allowed' header from views.py 
      // allows us to set scope: '/' even if the file is served from /notifications/
      navigator.serviceWorker.register(swUrl, { scope: '/' })
        .then(function(registration) {
          console.log('✅ Service Worker Registered. Scope:', registration.scope);
        }).catch(function(err) {
          console.error('❌ Service Worker Registration Failed:', err);
        });
    }

    // 4. Define the Save Token Function
    function sendTokenToServer(token) {
        console.log("🚀 Sending token to server...");
        fetch('/api/fcm/save-token/', {  
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}'
            },
            body: JSON.stringify({ token: token })
        })
        .then(response => {
            if (response.ok) {
                console.log("✅ Token saved to server successfully.");
            } else {
                console.error("⚠️ Failed to save token:", response.statusText);
            }
        })
        .catch(error => console.error("❌ Error sending token:", error));
    }

    // 5. Permission Request Logic (Robust Version)
    window.requestNotificationPermission = function() {
        console.log('Requesting permission...');
        Notification.requestPermission().then((permission) => {
            if (permission === 'granted') {
                console.log('🎉 Notification permission granted. Waiting for SW ready...');
                
                // CRITICAL FIX: Wait for the Service Worker to be 'ready' before getting token.
                // This prevents "Subscription failed - no active Service Worker" errors.
                navigator.serviceWorker.ready.then((registration) => {
                    return messaging.getToken({ 
                        vapidKey: vapidKey, 
                        serviceWorkerRegistration: registration 
                    });
                }).then((currentToken) => {
                    if (currentToken) {
                        console.log('Token retrieved:', currentToken);
                        sendTokenToServer(currentToken);
                    } else {
                        console.log('No registration token available.');
                    }
                }).catch((err) => {
                    console.error('An error occurred while retrieving token.', err);
                });

            } else {
                console.warn('Permission denied by user.');
            }
        });
    };

    // 6. Automatic Check on Load
    if (Notification.permission === 'granted') {
        console.log("Permission already granted. Ensuring token is up to date...");
        // Wait for SW ready here too
        navigator.serviceWorker.ready.then((registration) => {
            messaging.getToken({ 
                vapidKey: vapidKey, 
                serviceWorkerRegistration: registration 
            }).then((currentToken) => {
                if (currentToken) sendTokenToServer(currentToken);
            }).catch((err) => {
                 console.error('Error fetching token on auto-check:', err);
            });
        });
    } else {
        console.log("🔔 Notifications not yet granted. Waiting for user interaction.");
    }

    // Handle incoming messages
    messaging.onMessage((payload) => {
        console.log('Message received in foreground:', payload);
    });

  })();
</script>
{% endif %}
