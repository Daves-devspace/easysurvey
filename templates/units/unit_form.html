{# properties/partials/unit_form.html #}
<form method="post"
      action="{% if form.instance.pk %}{% url 'unit_edit' pk=property.pk unit_pk=form.instance.pk %}{% else %}{% url 'unit_add' pk=property.pk %}{% endif %}">
  {% csrf_token %}

 

  <div class="modal-body">
    {{ form.as_p }}
  </div>
  
<div class="modal-footer">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
    <button type="submit" class="btn btn-primary">Save</button>
  </div>
 
  
</form>
