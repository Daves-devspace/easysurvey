<!-- payroll_delete_modal.html -->
<div class="modal fade" id="payrollDeleteModal" tabindex="-1" aria-labelledby="payrollDeleteModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <form id="payroll-delete-form" method="post">
      {% csrf_token %}
      <div class="modal-content">
        <div class="modal-header bg-danger text-white">
          <h5 class="modal-title">Confirm Delete</h5>
          <button type="button" class="btn-close text-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p>Are you sure you want to delete this payroll entry?</p>
        </div>
        <div class="modal-footer">
          <button type="submit" class="btn btn-danger">Yes, Delete</button>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        </div>
      </div>
    </form>
  </div>
</div>
