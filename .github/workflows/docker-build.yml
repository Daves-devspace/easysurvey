name: Build and Push Docker Image

# This triggers the workflow whenever you push a change to the plotsync branch
on:
  push:
    branches:
      - plotsync

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Get the code from the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Log in to Docker Hub using GitHub Secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Set up Docker Buildx (allows for advanced builds and caching)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Build and push the image to Docker Hub
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tags the image with both 1.3 and latest for easier pulling on the VPS
          tags: |
            davedevspace/smartsurveyor:1.3
