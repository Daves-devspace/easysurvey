name: Deploy App

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag (default: latest)"
        required: false
        default: "latest"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # Branch → environment mapping
    environment: ${{ github.ref == 'refs/heads/main' && 'prod-companyB' || github.ref == 'refs/heads/master' && 'prod-companyA' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.REGISTRY }}/${{ github.repository }}:${{ github.ref_name }}-${{ github.event.inputs.image_tag }}
            ${{ secrets.REGISTRY }}/${{ github.repository }}:${{ github.ref_name }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
